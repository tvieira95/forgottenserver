name: Build with vcpkg

on:
  push:
    branches:
      - main
      - 'fix/**'
      - 'feat/**'
    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json

  pull_request:
    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      VCPKG_BUILD_TYPE: release
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkg_cache,readwrite

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Get latest CMake
        uses: lukka/get-cmake@v4.3.4

      - name: Create vcpkg cache directory
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/vcpkg_cache"

      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json', 'CMakeLists.txt', '**/CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-windows-

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_TESTING=OFF `
            -DENABLE_ASAN=OFF

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-windows-${{ github.sha }}
          path: |
            build/**/*.log
            vcpkg/buildtrees/**/*.log

      - name: Upload artifact binary
        uses: actions/upload-artifact@v7
        with:
          name: tfs-windows-${{ github.sha }}
          path: build/tfs.exe
